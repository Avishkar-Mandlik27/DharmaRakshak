<!doctype html>
<html lang="mr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>छत्रपती संभाजी महाराज जयंती २०२६</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Updated Google Fonts: Inknut Antiqua + Cinzel -->
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;500;600;700;800;900&family=Cinzel:wght@400;500;600;700;800;900&display=swap" 
          rel="stylesheet">

    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #1c0f07;
        color: #fff;
      }

      /* Royal Marathi Font - Inknut Antiqua */
      .font-serif,
      h1, h2, h3, h4, h5, h6,
      .royal-heading,
      .tracking-widest {
        font-family: "Inknut Antiqua", serif;
        font-weight: 700;
      }

      /* Royal English Font - Cinzel */
      .royal-english,
      .tracking-widest-english {
        font-family: "Cinzel", serif;
        font-weight: 700;
        letter-spacing: 1px;
      }

      /* English Mode - Force Cinzel (Royal Serif) everywhere */
      .english-mode,
      .english-mode h1,
      .english-mode h2,
      .english-mode h3,
      .english-mode h4,
      .english-mode h5,
      .english-mode h6 {
        font-family: "Cinzel", serif !important;
        font-weight: 700;
      }

      english-mode p,
     .paragraph ,
     .royal-paragraph {
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
      }

      /* Make English text slightly more subtle and elegant */
      .english-mode .text-4xl,
      .english-mode .text-3xl {
        font-size: 1.9rem;
        line-height: 1.15;
      }

      /* Enhance Devanagari rendering for Marathi */
      body {
        font-feature-settings: "kern" 1, "liga" 1;
        text-rendering: optimizeLegibility;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
