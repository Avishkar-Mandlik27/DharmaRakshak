<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>छत्रपती संभाजी महाराज जयंती २०२६</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" 
        rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1C0F07;
      color: #fff;
    }

    /* Use Inknut Antiqua for headings and royal text */
    h1, h2, h3, h4, h5, h6, 
    .royal-heading, 
    .font-serif, 
    .tracking-widest {
      font-family: 'Inknut Antiqua', serif;
      font-weight: 600;
    }

    /* Optional: Make Marathi text look more elegant */
    p, span, a, button, div {
      font-family: 'Poppins', sans-serif;
    }

    /* Enhance Devanagari (Marathi) rendering */
    body {
      font-feature-settings: "kern" 1, "liga" 1;
      text-rendering: optimizeLegibility;
    }

    /* English Mode - Force Poppins everywhere */
    .english-mode,
    .english-mode h1,
    .english-mode h2,
    .english-mode h3,
    .english-mode h4,
    .english-mode h5,
    .english-mode h6 {
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }

    .english-mode .royal-heading {
      font-family: 'Poppins', sans-serif !important;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
